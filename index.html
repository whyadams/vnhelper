    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />

      rel="stylesheet"
    />
    <title>VnHelper</title>
    <style>
      /* Paint the dark surface before any CSS loads so the webview never
         flashes its default white background on cold start. The widget
         window adds `.is-widget` later and overrides this to transparent. */
      html,
      body {
        margin: 0;
        background-color: #131416;
      }
    </style>
  </head>

  </body>
